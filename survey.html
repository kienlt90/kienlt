    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --accent-color: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #cbd5e1;
            --input-bg: #ffffff;
            
            --success: #059669;
            --success-glow: rgba(5, 150, 105, 0.1);
            --danger: #dc2626;
            --danger-glow: rgba(220, 38, 38, 0.1);
            --warning: #d97706;
            --warning-glow: rgba(217, 119, 6, 0.1);
            
            --card-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.06);
            --transition-speed: 0.25s;
        }

        .dark-theme {
            --bg-primary: #0b0f19;
            --bg-secondary: #161f30;
            --bg-tertiary: #1f2d44;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: #2a3b56;
            --input-bg: #111827;
            
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.2);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.2);
            
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        /* Header */
        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--card-shadow);
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* Form Container & Layout */
        .form-container {
            max-width: 1300px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            flex-grow: 1;
        }

        @media (max-width: 900px) {
            .form-container {
                grid-template-columns: 1fr;
            }
            aside {
                position: static !important;
            }
        }

        /* Sidebar Step Menu */
        aside {
            position: sticky;
            top: 90px;
            height: fit-content;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem;
            box-shadow: var(--card-shadow);
        }

        .step-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: all var(--transition-speed) ease;
        }

        .step-item:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .step-item.active {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        /* Main Form Panel */
        main {
            min-width: 0;
        }

        .form-panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .section-header {
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Subsections */
        .subsection-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-color);
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.25rem;
            border-bottom: 1px dashed var(--border-color);
        }

        /* Input Controls */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition-speed);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* Inpatient Department Table */
        .table-responsive {
            overflow-x: auto;
            margin-top: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        /* Buttons styling */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            filter: brightness(1.1);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            filter: brightness(1.1);
        }

        .form-nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        /* File input overlay */
        .file-upload-btn {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-upload-btn input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* Theme button */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-tertiary);
        }

        footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: auto;
        }
    </style>
</head>

    <script>

            }
        })();
    </script>
    <header>
        <div class="header-container">

                <h1>PHIẾU KHẢO SÁT HỆ THỐNG RIS/PACS - LIS - EMR BỆNH VIỆN</h1>

            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-btn" title="Đổi giao diện">🌓</button>
                <button class="btn btn-primary" onclick="resetToNewSurvey()" style="background-color: #3b82f6; border: none;">

                <span class="file-upload-btn btn btn-secondary">

                <button class="btn btn-secondary" onclick="exportData()">💾 Lưu/Tải JSON</button>

                <button class="btn btn-success" onclick="window.print()">🖨️ Xuất Báo Cáo PDF</button>
                <button class="btn btn-secondary" onclick="isNavigatingAway = true; window.location.href='main.html'" style="background-color: #4b5563; border: none; color: white;">🏠 Quay lại Trang chính</button>
                <button class="btn btn-danger" onclick="logout()" style="background-color: #dc2626; border: none;">🚪 Đăng xuất</button>
            </div>
        </div>
    </header>

    <div class="form-container">

                    <li><button class="step-item" id="btn-SoLieuKCB" onclick="switchStep('SoLieuKCB')">📊 2. Số liệu KCB</button></li>
                    <li><button class="step-item" id="btn-DS_KhoaNoiTru" onclick="switchStep('DS_KhoaNoiTru')">🛌 3. Khoa nội trú & Giường</button></li>
                    <li><button class="step-item" id="btn-KEHOACHDUKIEN" onclick="switchStep('KEHOACHDUKIEN')">📅 4. Kế hoạch triển khai</button></li>
                    <li><button class="step-item" id="btn-LIS" onclick="switchStep('LIS')">🧪 5. Khảo sát LIS & Thiết bị</button></li>
                    <li><button class="step-item" id="btn-RISPACS" onclick="switchStep('RISPACS')">📸 6. Khảo sát RIS/PACS & CĐHA</button></li>
                    <li><button class="step-item" id="btn-EMR" onclick="switchStep('EMR')">🏥 7. Khảo sát EMR & Số hóa</button></li>
                    <li><button class="step-item" id="btn-InfraSecurity" onclick="switchStep('InfraSecurity')">💻 8. Hạ tầng & Bảo mật</button></li>
                </ul>
            </div>
        </aside>

        <main>
            <!-- panels container -->
            <div id="survey-panels-container"></div>
        </main>
    </div>

    <footer>
        <p>© 2026. Biểu mẫu khảo sát thực trạng số hóa Bệnh viện / Trung tâm Y tế.</p>
    </footer>

        let surveyState = JSON.parse(JSON.stringify(templateData));
        const stepOrder = ["ThongTinChung", "SoLieuKCB", "DS_KhoaNoiTru", "KEHOACHDUKIEN", "LIS", "RISPACS", "EMR", "InfraSecurity"];

        function setupTheme() {
            // Apply saved theme on load
            const savedTheme = localStorage.getItem('vnpt_his_theme') || 'dark';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }

            const btn = document.getElementById('theme-btn');
            if (btn) {
                btn.addEventListener('click', () => {
                    const isDark = document.body.classList.toggle('dark-theme');
                    localStorage.setItem('vnpt_his_theme', isDark ? 'dark' : 'light');
                });
            }
        }

        function switchStep(stepId) {
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.step-item').forEach(i => i.classList.remove('active'));
            
            const panel = document.getElementById(`panel-${stepId}`);
            if (panel) panel.classList.add('active');
            
            const btn = document.getElementById(`btn-${stepId}`);
            if (btn) btn.classList.add('active');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (stepId === 'EMR') {
                setTimeout(filterEMRTable, 50);
            }
        }

        function getPrevStep(currentId) {
            const idx = stepOrder.indexOf(currentId);
            return idx > 0 ? stepOrder[idx - 1] : null;
        }

        function getNextStep(currentId) {
            const idx = stepOrder.indexOf(currentId);
            return idx < stepOrder.length - 1 ? stepOrder[idx + 1] : null;
        }

        function renderForm() {
            const container = document.getElementById('survey-panels-container');
            container.innerHTML = '';

            stepOrder.forEach(stepId => {
                const sheetData = surveyState[stepId];
                const panel = document.createElement('div');
                panel.id = `panel-${stepId}`;
                panel.className = 'form-panel';
                if (stepId === 'ThongTinChung') panel.classList.add('active');

                let title = sheetData.title || stepId;
                let headerHtml = `
                    <div class="section-header">
                        <div class="section-title">${title}</div>
                        <div style="font-size:0.8rem; color:var(--text-secondary); font-weight:700;">BƯỚC ${stepOrder.indexOf(stepId) + 1} / ${stepOrder.length}</div>
                    </div>
                `;

                let bodyHtml = '';
                if (stepId === 'ThongTinChung' || stepId === 'SoLieuKCB') {
                    bodyHtml = renderFieldForm(stepId, sheetData);
                } else if (stepId === 'DS_KhoaNoiTru') {
                    bodyHtml = renderDepartmentTable(stepId, sheetData);
                } else if (stepId === 'KEHOACHDUKIEN') {
                    bodyHtml = renderScheduleTable(stepId, sheetData);
                } else if (stepId === 'LIS') {
                    bodyHtml = renderLISForm(sheetData);
                } else if (stepId === 'RISPACS') {
                    bodyHtml = renderRISPACSForm(sheetData);
                } else if (stepId === 'EMR') {
                    bodyHtml = renderEMRForm(sheetData);
                } else if (stepId === 'InfraSecurity') {
                    bodyHtml = renderInfraSecurityForm(sheetData);
                }

                // nav buttons
                const prev = getPrevStep(stepId);
                const next = getNextStep(stepId);
                let navHtml = '<div class="form-nav-buttons">';
                if (prev) {
                    navHtml += `<button class="btn btn-secondary" onclick="switchStep('${prev}')">⬅️ Quay lại</button>`;
                } else {
                    navHtml += '<span></span>';
                }
                if (next) {
                    navHtml += `<button class="btn btn-primary" onclick="switchStep('${next}')">Tiếp theo ➡️</button>`;
                } else {
                    navHtml += `<button class="btn btn-success" onclick="exportData()">💾 Hoàn thành & Xuất dữ liệu</button>`;
                }
                navHtml += '</div>';

                panel.innerHTML = headerHtml + bodyHtml + navHtml;
                container.appendChild(panel);
            });
        }

        // Render generic field lists
        function renderFieldForm(stepId, sheetData) {
            let html = '<div class="form-grid">';
            sheetData.data.slice(2).forEach((row, rIdx) => {
                if (row.length >= 3) {
                    const rowIdx = rIdx + 2;
                    html += `
                        <div class="form-group">
                            <label class="form-label">${row[1]}</label>
                            <input type="text" class="form-input" value="${row[2] || ''}" onchange="updateStateValue('${stepId}', ${rowIdx}, 2, this.value)">
                        </div>
                    `;
                }
            });
            html += '</div>';
            return html;
        }

        // Render Inpatient Departments (Streamlined to STT, Khoa, Giường)

        // Export survey as JSON
        function exportData() {
            let hospitalName = "Chua_Dat_Ten";
            try {
                const nameRow = surveyState.ThongTinChung.data.find(row => row[1] && row[1].includes("Tên cơ sở y tế"));
                if (nameRow && nameRow[2]) {
                    hospitalName = nameRow[2].trim().replace(/[^a-zA-Z0-9]/g, "_");
                }
            } catch (e) {
                console.error(e);
            }
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(surveyState, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `Survey_RIS_LIS_EMR_${hospitalName}_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(dl);
            dl.click();
            dl.remove();
        }

            data.push([]);
            
            data.push(["DANH SÁCH BIỂU MẪU XÁC NHẬN SỬ DỤNG:"]);
            data.push(["STT", "Thông tư", "Tên biểu mẫu / Mẫu phiếu", "Trạng thái sử dụng"]);
            surveyState.EMR.templates.forEach(tpl => {
                data.push([tpl.STT, tpl.circular, tpl.name, tpl.checked ? "Có sử dụng" : "Không sử dụng"]);
            });
            data.push([]);
            
            // 7. Hạ tầng & Bảo mật
            data.push(["VII. HẠ TẦNG CNTT & BẢO MẬT"]);
            data.push(["Điều hòa nhiệt độ phòng máy chủ (Hoạt động 24/7)", surveyState.InfraSecurity.general.server_ac]);
            data.push(["Hệ thống phòng cháy chữa cháy chuyên dụng", surveyState.InfraSecurity.general.server_fire]);
            data.push(["Hệ thống camera giám sát phòng máy chủ", surveyState.InfraSecurity.general.server_camera]);
            data.push(["Số lượng nhà cung cấp Internet (ISPs) kết nối", surveyState.InfraSecurity.general.isp_count]);
            data.push(["Tên các nhà mạng Internet cung cấp", surveyState.InfraSecurity.general.isp_names || ""]);
            data.push(["Băng thông đường truyền internet chính", surveyState.InfraSecurity.general.main_bandwidth]);
            data.push(["Độ phủ mạng không dây (Wifi) toàn bệnh viện", surveyState.InfraSecurity.general.wifi_coverage]);
            data.push(["Thiết bị tường lửa cứng bảo vệ mạng", surveyState.InfraSecurity.general.firewall_hardware]);
            data.push(["Phần mềm diệt virus bản quyền tập trung", surveyState.InfraSecurity.general.antivirus_software]);
            data.push(["Chính sách ngăn chặn sao chép dữ liệu qua USB", surveyState.InfraSecurity.general.usb_control]);
            data.push([]);
            data.push([]);
            
            // Signature block
            data.push(["", "", "", "............, ngày ..... tháng ..... năm 2026"]);
            data.push(["", "ĐẠI DIỆN ĐƠN VỊ ĐƯỢC KHẢO SÁT", "", "ĐẠI DIỆN ĐOÀN KHẢO SÁT"]);
            data.push(["", "(Ký, ghi rõ họ tên và đóng dấu)", "", "(Ký và ghi rõ họ tên)"]);
            for (let i = 0; i < 4; i++) data.push([]);
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            
            // Set dynamic column widths to auto-fit content
            const max_len = [];
            data.forEach(row => {
                row.forEach((val, colIdx) => {
                    const str = String(val || '');
                    const len = str.length;
                    if (!max_len[colIdx] || len > max_len[colIdx]) {
                        max_len[colIdx] = len;
                    }
                });
            });
            ws['!cols'] = max_len.map(len => ({ wch: Math.min(Math.max(len + 2, 8), 65) }));
            
            XLSX.utils.book_append_sheet(wb, ws, "Phieu_Khao_Sat");
            
            let hospitalName = "Chua_Dat_Ten";
            try {
                const nameRow = surveyState.ThongTinChung.data.find(row => row[1] && row[1].includes("Tên cơ sở y tế"));
                if (nameRow && nameRow[2]) {
                    hospitalName = nameRow[2].trim().replace(/[^a-zA-Z0-9]/g, "_");
                }
            } catch (e) {}
            
            XLSX.writeFile(wb, `Phieu_Khao_Sat_EMR_${hospitalName}_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // Import survey draft JSON
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.ThongTinChung && (imported.LIS || imported.RISPACS)) {
                        surveyState = imported;
                        renderForm();
                        alert("Đã tải dữ liệu bản thảo thành công!");
                    } else {
                        alert("Định dạng file JSON không khớp với biểu mẫu khảo sát.");
                    }
                } catch (err) {
                    alert("Lỗi khi đọc file JSON: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        let isNavigatingAway = false;

        function logout() {
            isNavigatingAway = true;
            localStorage.removeItem('vnpt_his_session');
            window.location.href = 'index.html';
        }

        function saveDraft() {
            localStorage.setItem('vnpt_his_survey_draft', JSON.stringify(surveyState));
        }

        window.emrSearchQuery = '';

        function onEMRSearchInput(el) {
            window.emrSearchQuery = el.value;
            filterEMRTable();
        }

        function filterEMRTable() {
            const query = (window.emrSearchQuery || '').trim().toLowerCase();
            const table = document.getElementById('emr-templates-table');
            if (!table) return;
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const circularCell = row.cells[1];
                const nameCell = row.cells[2];
                if (!circularCell || !nameCell) return;
                
                let circularText = '';
                const circularInput = circularCell.querySelector('input');
                if (circularInput) {
                    circularText = circularInput.value;
                } else {
                    circularText = circularCell.textContent;
                }
                
                let nameText = '';
                const nameInput = nameCell.querySelector('input');
                if (nameInput) {
                    nameText = nameInput.value;
                } else {
                    nameText = nameCell.textContent;
                }
                
                const combinedText = (circularText + ' ' + nameText).toLowerCase();
                if (combinedText.includes(query)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        // Auto-save triggers
        document.addEventListener('input', saveDraft);
        document.addEventListener('change', saveDraft);
        document.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON' || event.target.closest('button')) {
                setTimeout(saveDraft, 100);
            }
        });

        // Unload warning guard
        window.addEventListener('beforeunload', function (e) {
            if (isNavigatingAway) return;
            e.preventDefault();
            e.returnValue = '';
        });

        window.onload = function() {
            // Restore draft if exists
            const draft = localStorage.getItem('vnpt_his_survey_draft');
            if (draft) {
                try {
                    surveyState = JSON.parse(draft);
                    alert("Hệ thống đã tự động khôi phục bản khảo sát đang làm dở của bạn!");
                } catch (e) {
                    console.error("Lỗi khôi phục bản thảo:", e);
                }
            }
            renderForm();
            setupTheme();
        };
    </script>
</body>
