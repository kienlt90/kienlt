<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Hệ thống KIENLT90</title>
  <!-- Google Fonts: Be Vietnam Pro -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <script>
    // Theme Initializer to prevent flash of light
    (function() {
      const theme = localStorage.getItem('vnpt_his_theme') || 'dark';
      if (theme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>

  <!-- Floating Theme Toggle -->
  <div class="floating-theme-toggle">
    <button id="theme-toggle-btn" class="btn-theme-toggle" title="Đổi giao diện">
      <span id="theme-icon">☀️</span>
    </button>
  </div>

  <!-- Floating animated background blobs -->
  <div class="bg-glow-container">
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>
    <div class="glow-blob blob-3"></div>
  </div>

  <!-- Main Container -->
  <main class="login-container" id="app-container">
    
    <!-- LOGIN VIEW -->
    <section id="login-view" class="auth-section">
      <div class="glass-card" id="login-card">
        
        <!-- Brand Logo & Title -->
        <div class="brand-header">
          <div class="logo-wrapper">
            <svg class="vnpt-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#06b6d4" />
                  <stop offset="50%" stop-color="#3b82f6" />
                  <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="8" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <!-- Outer glowing hexagon -->
              <path d="M 100 15 L 173.6 57.5 L 173.6 142.5 L 100 185 L 26.4 142.5 L 26.4 57.5 Z" fill="none" stroke="url(#logo-grad)" stroke-width="3" opacity="0.4" />
              <path d="M 100 15 L 173.6 57.5 L 173.6 142.5 L 100 185 L 26.4 142.5 L 26.4 57.5 Z" fill="none" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.8" filter="url(#glow)" />
              <!-- Thin inner grid lines -->
              <line x1="100" y1="15" x2="100" y2="185" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4 4" />
              <line x1="26.4" y1="100" x2="173.6" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4 4" />
              <!-- Stylized "9" -->
              <path d="M 100 90 A 22 22 0 1 0 56 90 A 22 22 0 0 0 100 90 L 100 120 C 100 135, 88 145, 70 145" fill="none" stroke="url(#logo-grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
              <!-- Stylized "0" -->
              <path d="M 154 102.5 A 22 30 0 1 1 110 102.5 A 22 30 0 1 1 154 102.5" fill="none" stroke="var(--color-text-primary)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
              <!-- Small tech nodes -->
              <circle cx="132" cy="102.5" r="5" fill="#06b6d4" />
              <circle cx="78" cy="90" r="4" fill="#6366f1" />
            </svg>
          </div>
          <h1 class="brand-name" style="font-size: 1.8rem; line-height: 1.3;">HỆ THỐNG <span>KIENLT90</span></h1>
          <p class="brand-subtitle" style="font-weight: 500; color: #3b82f6; margin-top: 0.6rem;">Chào mừng bạn đến với Cổng quản lý hệ thống</p>
        </div>

        <!-- Notification Toast (For error feedback) -->
        <div id="error-toast" class="toast hidden">
          <span class="toast-icon">⚠️</span>
          <span id="toast-message" class="toast-text">Tên đăng nhập hoặc mật khẩu không đúng.</span>
        </div>

        <!-- Form -->
        <form id="login-form" novalidate>
          
          <!-- Input Group: Username -->
          <div class="input-group">
            <div class="input-wrapper">
              <input type="text" id="username" class="form-input" required autocomplete="username" placeholder=" ">
              <label for="username" class="form-label">Tên đăng nhập</label>
              <span class="input-highlight"></span>
            </div>
            <span class="field-error" id="username-error"></span>
          </div>

          <!-- Input Group: Password -->
          <div class="input-group">
            <div class="input-wrapper">
              <input type="password" id="password" class="form-input" required autocomplete="current-password" placeholder=" ">
              <label for="password" class="form-label">Mật khẩu</label>
              <span class="input-highlight"></span>
              <span class="toggle-password" id="toggle-password-btn">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </span>
            </div>
            <span class="field-error" id="password-error"></span>
          </div>

          <!-- Keep Signed In & Forgot Password -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" checked>
              <span class="custom-checkbox"></span>
              Ghi nhớ đăng nhập
            </label>
            <a href="#" class="forgot-pass-link" id="forgot-link">Quên mật khẩu?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="submit-btn" class="btn-primary">
            <span class="btn-text">Đăng nhập</span>
            <span class="btn-loader hidden">
              <span class="spinner"></span>
            </span>
          </button>
        </form>

        <!-- Footer Info -->
        <div class="card-footer">
          <p>&copy; 2026 KIENLT90 Portal. All rights reserved.</p>
          <div class="footer-links">
            <a href="#">Hỗ trợ kỹ thuật</a>
            <span class="dot"></span>
            <a href="#">Điều khoản sử dụng</a>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- Script -->
  <script src="app.js"></script>
</body>
</html>
